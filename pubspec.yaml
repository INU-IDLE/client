name: rushcutter
description: A Flutter project for subway navigation.

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map_location_marker: ^10.0.0
  provider: ^6.1.1
  flutter_map: ^8.1.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  path_parsing: ^1.1.0
  petitparser: ^6.1.0
  vector_graphics: ^1.1.18
  vector_graphics_codec: ^1.1.13
  photo_view: ^0.15.0
  xml: ^6.5.0
  latlong2: ^0.9.1
  vector_graphics_compiler: ^1.1.16
  image_picker: ^1.0.4
  image_cropper: ^9.1.0
  intl: ^0.19.0
  easy_localization: ^3.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  vector_graphics_compiler: ^1.1.16

flutter:
  uses-material-design: true
  assets:
    - assets/station_info.json
    - assets/images/metropolitan.svg