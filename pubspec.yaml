name: rushcutter
description:  A project for real-time prediction of subway car-by-car congestion.


version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map_location_marker: ^10.0.0
  provider: ^6.1.1
  flutter_map: ^8.1.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  path_parsing: ^1.1.0
  petitparser: ^6.1.0
  vector_graphics: ^1.1.18
  vector_graphics_codec: ^1.1.13
  photo_view: ^0.15.0
  xml: ^6.5.0
  latlong2: ^0.9.1
  vector_graphics_compiler: ^1.1.16
  image_picker: ^1.0.4
  image_cropper: ^9.1.0
  intl: ^0.19.0
  easy_localization: ^3.0.1
  http: ^1.3.0
  dio: ^5.4.3
  flutter_dotenv: ^5.2.1
  flutter_native_splash: ^2.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  vector_graphics_compiler: ^1.1.16
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/station_info.json
    - assets/images/metropolitan.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/my_icon.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/images/my_icon.png
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: assets/images/my_icon.png
    icon_size: 1024
  macos:
    generate: true
    image_path: assets/images/my_icon.png
