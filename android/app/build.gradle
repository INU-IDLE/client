plugins {
    id "com.android.application"
    id 'kotlin-android'
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace 'com.rushcutter.rushcutter'
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.rushcutter"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source '../..'
}
